version: '3.8'

services:
  mongo-auth:
    image: mongo:6.0
    container_name: mongo-auth
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: appuser
      MONGO_INITDB_ROOT_PASSWORD: apppass123
    volumes:
      - ./mongo-init:/docker-entrypoint-initdb.d
      - mongo-data:/data/db

volumes:
  mongo-data:
